name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  deploy-api:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Publish API
        run: |
          dotnet publish PostgresDemo.Api \
            -c Release \
            -o publish

      - name: Copy to web root
        run: |
          rm -rf /var/www/myapp/api/*
          cp -r publish/* /var/www/myapp/api/

      - name: Restart service
        run: sudo systemctl restart myapi