deploy-api:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish API
        run: |
          dotnet publish PostgresDemo.Api \
            -c Release \
            -o publish

      - name: Copy to web root
        run: |
          sudo rm -rf /var/www/myapp/api/*
          sudo cp -r publish/* /var/www/myapp/api/

      - name: Restart service
        run: sudo systemctl restart myapi