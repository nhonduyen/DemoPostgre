name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'PostgresDemo.Api/**'
      - '.github/workflows/deploy-backend.yml'
      - 'PostgresDemo.sln'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Publish API
        run: |
          dotnet publish PostgresDemo.Api \
            -c Release \
            -o publish

      - name: Copy to web root
        run: |
          rm -rf /var/www/myapp/api/*
          cp -r publish/* /var/www/myapp/api/

      - name: Restart service
        run: sudo systemctl restart myapi