name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Build React
        run: |
          cd PostgresDemo.Frontend
          npm ci
          npm run build

      - name: Copy to web root
        run: |
          sudo rm -rf /var/www/myapp/react/*
          sudo cp -r PostgresDemo.Frontend/dist/* /var/www/myapp/react/