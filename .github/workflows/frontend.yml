name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'PostgresDemo.Frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > PostgresDemo.Frontend/.env.production

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Build React
        run: |
          cd PostgresDemo.Frontend
          npm ci
          npm run build

      - name: Copy to web root
        run: |
          rm -rf /var/www/myapp/react/*
          cp -r PostgresDemo.Frontend/dist/* /var/www/myapp/react/