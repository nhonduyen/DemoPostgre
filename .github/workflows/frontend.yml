name: Deploy React

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Verify required secrets
      run: |
        echo "Checking required secrets..."
        missing=0
        if [ -n "${{ secrets.SERVER_HOST }}" ]; then echo "SERVER_HOST: set"; else echo "SERVER_HOST: NOT SET"; missing=1; fi
        if [ -n "${{ secrets.SERVER_USER }}" ]; then echo "SERVER_USER: set"; else echo "SERVER_USER: NOT SET"; missing=1; fi
        if [ -n "${{ secrets.SERVER_SSH_KEY }}" ]; then echo "SERVER_SSH_KEY: set"; else echo "SERVER_SSH_KEY: NOT SET"; missing=1; fi
        if [ $missing -ne 0 ]; then echo "One or more required secrets are missing. Failing job."; exit 1; fi

    - uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - run: |
        cd PostgresDemo.Frontend
        npm ci
        npm run build

    - uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "frontend/ReactApp/dist/*"
        target: "/var/www/myapp/react"