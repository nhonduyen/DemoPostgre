name: Deploy DB

on:
  push:
    branches: [dev, staging, main]
    paths:
      - 'PostgresDemo.DbMigrator/**'
      - '.github/workflows/db-migrator.yml'
      - 'PostgresDemo.sln'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Override environment (leave blank to auto-detect)'
        required: false
        type: choice
        options:
          - ''
          - dev
          - staging
          - production

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
    steps:
      - id: set
        run: |
          # Use manual input if provided, otherwise detect from branch
          if [[ -n "${{ inputs.environment }}" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
          fi
          
  generate-script:
    runs-on: self-hosted
    needs: resolve-env
    environment: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Print active environment
        run: echo "Deploying to ${{ needs.resolve-env.outputs.environment }}"

      - name: Clean previous publish output
        run: rm -rf publish

      - name: Restore DbMigrator
        run: dotnet restore PostgresDemo.DbMigrator/PostgresDemo.DbMigrator.csproj

      - name: Publish DbMigrator
        run: dotnet publish PostgresDemo.DbMigrator/PostgresDemo.DbMigrator.csproj -c Release -o publish/db-migrator

      - name: Generate pending migration SQL
        run: dotnet publish/db-migrator/PostgresDemo.DbMigrator.dll generate
        env:
          DB_CONNECTION: ${{ secrets.DB_CONNECTION_STRING }}

      - name: Write SQL to job summary
        run: |
          echo '## Pending Migrations' >> $GITHUB_STEP_SUMMARY
          if [ -f pending-migration.sql ]; then
            echo '```sql' >> $GITHUB_STEP_SUMMARY
            cat pending-migration.sql >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo 'pending-migration.sql not found' >> $GITHUB_STEP_SUMMARY
          fi

  deploy-db-migrator:
    needs: generate-script
    runs-on: self-hosted
    environment: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - name: Run DB migrations
        run: dotnet publish/db-migrator/PostgresDemo.DbMigrator.dll migrate
        env:
          DB_CONNECTION: ${{ secrets.DB_CONNECTION_STRING }}