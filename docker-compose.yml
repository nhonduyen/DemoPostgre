version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: PostgresDemo
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./PostgreDemo.Database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: PostgresDemo.Api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=PostgresDemo;Username=postgres;Password=postgres"
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./PostgresDemo.Frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  db-data:
